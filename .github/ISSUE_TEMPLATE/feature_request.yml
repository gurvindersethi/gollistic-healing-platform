name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem or opportunity and the change you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What need does this address?
      placeholder: e.g. Visitors can't easily book a session from mobile
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should we build or change?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about
      placeholder: Optional

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Content
        - Design / UX
        - SEO
        - Performance
        - Accessibility
        - Infrastructure
        - Other
    validations:
      required: true

  - type: checkboxes
    id: docs
    attributes:
      label: Documentation
      options:
        - label: This may require updates to docs/ (blueprint, content, SEO, etc.)
          required: false
